<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket Pool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #f0f0f0; --text2: #c0c0c0; --muted: #777;
    --accent: #e8ff47; --green: #4ade80; --red: #f87171; --orange: #fb923c;
    --blue: #60a5fa;
    --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .header-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .header-pool { font-size: 15px; font-weight: 600; flex: 1; }
  .header-meta { font-size: 11px; color: var(--muted); }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 20px; overflow-x: auto; }
  .tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* Content */
  .content { max-width: 900px; margin: 0 auto; padding: 20px 16px 64px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Standings table */
  .standings { width: 100%; border-collapse: collapse; font-size: 13px; }
  .standings thead th { padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  .standings thead th.right { text-align: right; }
  .standings tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
  .standings tbody tr:hover { background: var(--surface); }
  .standings td { padding: 10px 12px; vertical-align: middle; }
  .standings td.right { text-align: right; }
  .rank { font-size: 12px; color: var(--muted); width: 32px; }
  .rank.top3 { color: var(--accent); font-weight: 700; }
  .entry-name { font-weight: 500; }
  .entry-member { font-size: 11px; color: var(--muted); }
  .score-val { font-weight: 700; font-size: 15px; }
  .score-max { font-size: 11px; color: var(--muted); }
  .champ-cell { display: flex; align-items: center; gap: 6px; }
  .champ-logo { width: 20px; height: 20px; border-radius: 50%; object-fit: contain; background: var(--surface2); }
  .badge-eliminated { font-size: 10px; background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); border-radius: 4px; padding: 1px 5px; }
  .badge-alive { font-size: 10px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); color: var(--green); border-radius: 4px; padding: 1px 5px; }

  /* Max possible bar */
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; min-width: 60px; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }
  .bar-fill.low { background: var(--orange); }

  /* Round breakdown cards */
  .round-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; font-size: 11px; }
  .round-cell { background: var(--surface2); border-radius: 6px; padding: 6px 4px; text-align: center; }
  .round-label { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .round-score { font-weight: 600; font-size: 13px; }
  .round-max { color: var(--muted); font-size: 10px; }

  /* Champion picks section */
  .champ-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .champ-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
  .champ-card-logo { width: 40px; height: 40px; object-fit: contain; }
  .champ-card-team { font-size: 13px; font-weight: 600; }
  .champ-card-count { font-size: 11px; color: var(--muted); }
  .champ-card-names { font-size: 10px; color: var(--muted); line-height: 1.6; }

  /* Path to Victory */
  .ptv-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .ptv-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .ptv-header:hover { background: var(--surface2); }
  .ptv-rank { font-size: 12px; color: var(--muted); width: 24px; flex-shrink: 0; }
  .ptv-rank.top3 { color: var(--accent); font-weight: 700; }
  .ptv-name { font-weight: 600; font-size: 14px; flex: 1; }
  .ptv-score { font-size: 13px; font-weight: 700; color: var(--accent); }
  .ptv-max { font-size: 11px; color: var(--muted); }
  .ptv-chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .ptv-entry.open .ptv-chevron { transform: rotate(180deg); }
  .ptv-body { display: none; padding: 0 14px 12px; }
  .ptv-entry.open .ptv-body { display: block; }
  .ptv-needs { display: flex; flex-wrap: wrap; gap: 6px; }
  .ptv-team-chip { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 12px; }
  .ptv-team-chip.high-value { border-color: rgba(232,255,71,0.3); background: rgba(232,255,71,0.06); }
  .ptv-chip-logo { width: 16px; height: 16px; border-radius: 50%; object-fit: contain; }
  .ptv-chip-name { font-weight: 500; }
  .ptv-chip-round { font-size: 10px; color: var(--muted); }
  .ptv-chip-pts { font-size: 10px; font-weight: 700; color: var(--accent); margin-left: 2px; }
  .ptv-no-picks { font-size: 12px; color: var(--muted); padding: 4px 0; }
  .ptv-eliminated { font-size: 12px; color: var(--red); padding: 4px 0; }

  /* Team Tracker */
  .tracker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .tracker-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .tracker-team-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .tracker-logo { width: 32px; height: 32px; border-radius: 50%; object-fit: contain; background: var(--surface2); flex-shrink: 0; }
  .tracker-team-info { flex: 1; min-width: 0; }
  .tracker-team-name { font-weight: 600; font-size: 14px; }
  .tracker-seed { font-size: 11px; color: var(--muted); }
  .tracker-count { font-size: 11px; font-weight: 600; color: var(--accent); text-align: right; white-space: nowrap; }
  .tracker-entries { display: flex; flex-direction: column; gap: 4px; }
  .tracker-entry-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; background: var(--surface2); border-radius: 5px; padding: 4px 8px; }
  .tracker-entry-name { color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tracker-entry-round { font-size: 10px; color: var(--muted); margin: 0 6px; }
  .tracker-entry-pts { font-size: 10px; font-weight: 700; color: var(--accent); }
  .tracker-total-pts { font-size: 10px; color: var(--muted); margin-top: 6px; text-align: right; }

  /* No-picks notice */
  .no-picks-notice { background: rgba(251,146,60,0.1); border: 1px solid rgba(251,146,60,0.3); color: var(--orange); border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }

  /* Loading */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); border-radius: 8px; padding: 16px; margin: 20px 0; font-size: 13px; }

  /* Section header */
  .section-header { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; margin-top: 24px; }
  .section-header:first-child { margin-top: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">BracketIQ</div>
  <div class="header-pool" id="pool-name">Loading...</div>
  <div class="header-meta" id="pool-meta"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('standings')">Standings</div>
  <div class="tab" onclick="showTab('path')">Path to Victory</div>
  <div class="tab" onclick="showTab('tracker')">Team Tracker</div>
  <div class="tab" onclick="showTab('champion')">Champion Picks</div>
</div>

<div class="content">
  <div id="loading" class="loading">
    <div class="spinner"></div><br>Loading pool data...
  </div>
  <div id="error" class="error-box" style="display:none"></div>

  <div class="tab-panel active" id="panel-standings"></div>
  <div class="tab-panel" id="panel-path"></div>
  <div class="tab-panel" id="panel-tracker"></div>
  <div class="tab-panel" id="panel-champion"></div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────
const JSONBIN_BASE  = 'https://api.jsonbin.io/v3/b';
const ROUND_LABELS  = { '1': 'R64', '2': 'R32', '3': 'S16', '4': 'E8', '5': 'F4', '6': 'Champ' };
const ROUND_POINTS  = { 1: 10, 2: 20, 3: 40, 4: 80, 5: 160, 6: 320 };

// ── State ────────────────────────────────────────────────────────────────
let pool = null;

// ── Tab switching ────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(name)));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}

// ── Load pool ────────────────────────────────────────────────────────────
(async function loadFromURL() {
  const p = new URLSearchParams(location.search);
  const binId = p.get('bin');
  const poolNameParam = p.get('poolname');

  if (!binId) {
    showError('No pool ID in URL. Add ?bin=YOUR_BIN_ID to the URL.');
    return;
  }

  if (poolNameParam) document.getElementById('pool-name').textContent = decodeURIComponent(poolNameParam);
  document.title = (poolNameParam ? decodeURIComponent(poolNameParam) : 'Bracket Pool') + ' — BracketIQ';

  try {
    const res = await fetch(`${JSONBIN_BASE}/${binId}/latest`);
    if (!res.ok) throw new Error(`Failed to load pool (${res.status})`);
    const data = await res.json();
    pool = data.record;

    if (pool.type !== 'espn-tc-2026') {
      showError('This URL is for a CBS-style pool. Use bracket-tracker.html instead.');
      return;
    }

    document.getElementById('loading').style.display = 'none';
    renderPool();
  } catch (err) {
    showError(err.message);
  }
})();

// ── Render all panels ─────────────────────────────────────────────────────
function renderPool() {
  const name = pool.groupSettings?.name || 'Bracket Pool';
  document.getElementById('pool-name').textContent = name;
  document.title = name + ' — BracketIQ';

  const entries    = pool.entries || [];
  const outcomeMap = pool.outcomeMap || {};
  const entryPicks = pool.entryPicks || {};

  // Sorted entries (by score desc, then maxPoss desc)
  const sorted = [...entries].sort((a, b) => {
    const sa = a.score?.overallScore ?? 0, sb = b.score?.overallScore ?? 0;
    if (sb !== sa) return sb - sa;
    return (b.score?.possiblePointsMax ?? 0) - (a.score?.possiblePointsMax ?? 0);
  });

  const maxPossAll = sorted[0]?.score?.possiblePointsMax ?? 1;
  document.getElementById('pool-meta').textContent = `${entries.length} entries`;

  renderStandings(sorted, outcomeMap, maxPossAll);
  renderPathToVictory(sorted, outcomeMap, entryPicks);
  renderTeamTracker(sorted, outcomeMap, entryPicks);
  renderChampionPicks(entries, outcomeMap);
}

// ── Standings ─────────────────────────────────────────────────────────────
function renderStandings(sorted, outcomeMap, maxPossAll) {
  let rank = 0, lastScore = null, lastMax = null;
  const rows = sorted.map((e, i) => {
    const s = e.score || {};
    const curScore = s.overallScore ?? 0;
    const maxPoss  = s.possiblePointsMax ?? 0;
    if (curScore !== lastScore || maxPoss !== lastMax) { rank = i + 1; lastScore = curScore; lastMax = maxPoss; }

    const champOutcome = outcomeMap[e.championOutcomeId];
    const champCell = champOutcome
      ? `<div class="champ-cell">${champOutcome.logoUrl ? `<img class="champ-logo" src="${champOutcome.logoUrl}" onerror="this.style.display='none'">` : ''}<span>${champOutcome.name || '—'}</span></div>`
      : '<span style="color:var(--muted)">—</span>';

    const eliminated   = s.eliminated;
    const statusBadge  = eliminated
      ? '<span class="badge-eliminated">OUT</span>'
      : '<span class="badge-alive">ALIVE</span>';

    const barPct   = maxPossAll > 0 ? Math.round((maxPoss / maxPossAll) * 100) : 0;
    const barClass = barPct < 40 ? 'bar-fill low' : 'bar-fill';
    const rankClass = rank <= 3 ? 'rank top3' : 'rank';

    const periods = s.scoreByPeriod || {};
    const roundCells = [1,2,3,4,5,6].map(r => {
      const pd    = periods[String(r)] || {};
      const sc    = pd.score ?? 0;
      const mx    = pd.possiblePointsMax ?? 0;
      const color = sc > 0 ? 'var(--green)' : mx === 0 ? 'var(--red)' : 'var(--text2)';
      return `<div class="round-cell">
        <div class="round-label">${ROUND_LABELS[r]}</div>
        <div class="round-score" style="color:${color}">${sc}</div>
        <div class="round-max">/${mx}</div>
      </div>`;
    }).join('');

    return `<tr>
      <td class="${rankClass}">${rank}</td>
      <td>
        <div class="entry-name">${esc(e.name)}</div>
        ${e.displayName && e.displayName !== e.name ? `<div class="entry-member">${esc(e.displayName)}</div>` : ''}
        <div style="margin-top:8px"><div class="round-grid">${roundCells}</div></div>
      </td>
      <td class="right">
        <div style="margin-bottom:4px">${statusBadge}</div>
        <div class="score-val">${curScore}</div>
        <div class="score-max">max ${maxPoss}</div>
        <div class="bar-wrap" style="margin-top:6px;justify-content:flex-end">
          <div class="bar-bg"><div class="${barClass}" style="width:${barPct}%"></div></div>
        </div>
      </td>
      <td>${champCell}</td>
    </tr>`;
  });

  document.getElementById('panel-standings').innerHTML = `
    <table class="standings">
      <thead>
        <tr>
          <th>#</th>
          <th>Entry / Round Breakdown</th>
          <th class="right">Score</th>
          <th>Champion Pick</th>
        </tr>
      </thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
}

// ── Path to Victory ───────────────────────────────────────────────────────
function renderPathToVictory(sorted, outcomeMap, entryPicks) {
  const hasAnyPicks = Object.keys(entryPicks).length > 0;

  let html = '';

  if (!hasAnyPicks) {
    html += `<div class="no-picks-notice">
      Individual bracket picks were not captured during setup.
      To enable Path to Victory, re-run setup and use the interception script (Step 3) to capture everyone's picks.
    </div>`;
  }

  let rank = 0, lastScore = null, lastMax = null;
  const cards = sorted.map((e, i) => {
    const s = e.score || {};
    const curScore = s.overallScore ?? 0;
    const maxPoss  = s.possiblePointsMax ?? 0;
    if (curScore !== lastScore || maxPoss !== lastMax) { rank = i + 1; lastScore = curScore; lastMax = maxPoss; }
    const rankClass = rank <= 3 ? 'ptv-rank top3' : 'ptv-rank';

    const picks = entryPicks[e.id] || [];
    const eliminated = s.eliminated;

    // Gather undecided picks, sorted by points descending
    const needed = [];
    for (const pick of picks) {
      const op = pick.outcomesPicked?.[0];
      if (!op || op.result !== 'UNDECIDED') continue;
      const round = pick.periodReached;
      const pts   = ROUND_POINTS[round] ?? 0;
      const team  = outcomeMap[op.outcomeId] || {};
      needed.push({ outcomeId: op.outcomeId, round, pts, team });
    }
    needed.sort((a, b) => b.pts - a.pts || a.round - b.round);

    let bodyHtml = '';
    if (eliminated) {
      bodyHtml = `<div class="ptv-eliminated">Eliminated — no path to victory remaining.</div>`;
    } else if (picks.length === 0) {
      bodyHtml = hasAnyPicks
        ? `<div class="ptv-no-picks">Picks not captured for this entry.</div>`
        : `<div class="ptv-no-picks">Picks not available.</div>`;
    } else if (needed.length === 0) {
      bodyHtml = `<div class="ptv-no-picks" style="color:var(--green)">All remaining picks are settled — no more games needed!</div>`;
    } else {
      const chips = needed.map(n => {
        const highValue = n.pts >= 80;
        const logo = n.team.logoUrl ? `<img class="ptv-chip-logo" src="${n.team.logoUrl}" onerror="this.style.display='none'">` : '';
        const teamName = n.team.abbrev || n.team.name || '?';
        const seed = n.team.seed ? `(${n.team.seed})` : '';
        return `<div class="ptv-team-chip${highValue ? ' high-value' : ''}">
          ${logo}
          <span class="ptv-chip-name">${esc(teamName)}</span>
          <span class="ptv-chip-round">${seed} ${ROUND_LABELS[String(n.round)] || 'R' + n.round}</span>
          <span class="ptv-chip-pts">+${n.pts}</span>
        </div>`;
      }).join('');
      const totalPending = needed.reduce((s, n) => s + n.pts, 0);
      bodyHtml = `<div class="ptv-needs">${chips}</div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">${needed.length} games remaining · ${totalPending} pts still to play</div>`;
    }

    return `<div class="ptv-entry" id="ptv-${e.id}">
      <div class="ptv-header" onclick="togglePTV('${e.id}')">
        <span class="${rankClass}">${rank}</span>
        <span class="ptv-name">${esc(e.name)}</span>
        <span class="ptv-score">${curScore}</span>
        <span class="ptv-max">/ max ${maxPoss}</span>
        <span class="ptv-chevron">▼</span>
      </div>
      <div class="ptv-body">${bodyHtml}</div>
    </div>`;
  });

  document.getElementById('panel-path').innerHTML = html + cards.join('');
}

function togglePTV(id) {
  const el = document.getElementById('ptv-' + id);
  if (el) el.classList.toggle('open');
}

// ── Team Tracker ──────────────────────────────────────────────────────────
function renderTeamTracker(sorted, outcomeMap, entryPicks) {
  const hasAnyPicks = Object.keys(entryPicks).length > 0;

  if (!hasAnyPicks) {
    document.getElementById('panel-tracker').innerHTML = `
      <div class="no-picks-notice">
        Individual bracket picks were not captured during setup.
        To enable Team Tracker, re-run setup and use the interception script (Step 3) to capture everyone's picks.
      </div>`;
    return;
  }

  // Build: teamOutcomeId → { team, entries: [{ entryName, round, pts }] }
  const teamMap = {};

  for (const e of sorted) {
    const picks = entryPicks[e.id] || [];
    for (const pick of picks) {
      const op = pick.outcomesPicked?.[0];
      if (!op || op.result !== 'UNDECIDED') continue;
      const oid   = op.outcomeId;
      const round = pick.periodReached;
      const pts   = ROUND_POINTS[round] ?? 0;
      if (!teamMap[oid]) teamMap[oid] = { team: outcomeMap[oid] || {}, entries: [] };
      teamMap[oid].entries.push({ entryName: e.name, round, pts });
    }
  }

  // Sort teams: most entries cheering first, then total pts desc
  const teams = Object.entries(teamMap).sort((a, b) => {
    const ca = a[1].entries.length, cb = b[1].entries.length;
    if (cb !== ca) return cb - ca;
    const pa = a[1].entries.reduce((s, e) => s + e.pts, 0);
    const pb = b[1].entries.reduce((s, e) => s + e.pts, 0);
    return pb - pa;
  });

  if (teams.length === 0) {
    document.getElementById('panel-tracker').innerHTML = `<div style="font-size:13px;color:var(--muted);padding:24px 0;text-align:center">No undecided picks found — all games are settled.</div>`;
    return;
  }

  const cards = teams.map(([oid, { team, entries }]) => {
    const logo = team.logoUrl ? `<img class="tracker-logo" src="${team.logoUrl}" onerror="this.style.display='none'">` : '<div class="tracker-logo"></div>';
    const totalPts = entries.reduce((s, e) => s + e.pts, 0);

    // Sort entries within card by pts desc
    const sortedEntries = [...entries].sort((a, b) => b.pts - a.pts || a.entryName.localeCompare(b.entryName));

    const entryRows = sortedEntries.map(e =>
      `<div class="tracker-entry-row">
        <span class="tracker-entry-name">${esc(e.entryName)}</span>
        <span class="tracker-entry-round">${ROUND_LABELS[String(e.round)] || 'R' + e.round}</span>
        <span class="tracker-entry-pts">+${e.pts}</span>
      </div>`
    ).join('');

    const seed = team.seed ? `Seed ${team.seed}` : '';
    return `<div class="tracker-card">
      <div class="tracker-team-header">
        ${logo}
        <div class="tracker-team-info">
          <div class="tracker-team-name">${esc(team.name || oid.slice(0, 8))}</div>
          ${seed ? `<div class="tracker-seed">${seed}</div>` : ''}
        </div>
        <div class="tracker-count">${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}</div>
      </div>
      <div class="tracker-entries">${entryRows}</div>
      <div class="tracker-total-pts">${totalPts} pts at stake</div>
    </div>`;
  });

  document.getElementById('panel-tracker').innerHTML = `
    <div class="section-header">Teams with entries still cheering for them</div>
    <div class="tracker-grid">${cards.join('')}</div>`;
}

// ── Champion Picks ────────────────────────────────────────────────────────
function renderChampionPicks(entries, outcomeMap) {
  const champCounts = {};
  for (const e of entries) {
    const id = e.championOutcomeId;
    if (!id) continue;
    if (!champCounts[id]) champCounts[id] = { outcome: outcomeMap[id], names: [] };
    champCounts[id].names.push(e.name);
  }
  const champSorted = Object.entries(champCounts).sort((a, b) => b[1].names.length - a[1].names.length);

  const champCards = champSorted.map(([id, { outcome, names }]) => {
    const team = outcome || {};
    return `<div class="champ-card">
      ${team.logoUrl ? `<img class="champ-card-logo" src="${team.logoUrl}" onerror="this.style.display='none'">` : ''}
      <div class="champ-card-team">${esc(team.name || id)}</div>
      <div class="champ-card-count">${names.length} ${names.length === 1 ? 'entry' : 'entries'}</div>
      <div class="champ-card-names">${names.map(esc).join('<br>')}</div>
    </div>`;
  }).join('');

  const noChamp = entries.filter(e => !e.championOutcomeId);
  document.getElementById('panel-champion').innerHTML = `
    <div class="section-header">Champion Pick Distribution</div>
    <div class="champ-grid">${champCards}</div>
    ${noChamp.length ? `<div style="margin-top:16px;font-size:12px;color:var(--muted)">${noChamp.map(e => esc(e.name)).join(', ')} — no champion recorded</div>` : ''}
  `;
}

// ── Helpers ──────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
