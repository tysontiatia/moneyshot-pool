  html += `<div class="setting-label">Master Key</div>`;
  html += `<input class="setting-input" id="cfg-bin-key" type="password" value="${CONFIG.jsonbinKey}" placeholder="JSONBin Master Key (for imports only)">`;
  html += `<div style="font-size:10px;color:var(--muted);margin-top:2px">Only needed to import/update picks. Found at jsonbin.io → Dashboard → API Keys</div>`;
  html += `</div>`;
  html += `<div class="setting-row">`;
  html += `<div class="setting-label">Your Name</div>`;
  html += `<input class="setting-input" id="cfg-my-name" value="${CONFIG.myName}" placeholder="Exactly as it appears in picks">`;
  if (state.picks?.entries?.length) {
    html += `<div style="font-size:10px;color:var(--muted);margin-top:4px">Available: ${state.picks.entries.slice(0,5).map(e => e.name).join(', ')}${state.picks.entries.length > 5 ? '...' : ''}</div>`;
  }
  html += `</div>`;
  html += `<button class="btn btn-primary btn-block" onclick="saveSettings()" style="margin-top:8px">Save & Reload</button>`;
  html += `<button class="btn btn-secondary btn-block" style="margin-top:8px" onclick="generateBookmark()">📎 Generate Bookmark URL</button>`;
  html += `</div>`;
  
  // Import
  html += `<div class="settings-section">`;
  html += `<div class="settings-title">📥 Import CBS Picks to JSONBin</div>`;
  html += `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Paste CBS bracket JSON data (array of entries)</div>`;
  html += `<textarea class="import-area" id="import-data" placeholder='[{"name":"...", "picks":[...], "championTeam":{...}}]'></textarea>`;
  html += `<button class="btn btn-primary btn-block" style="margin-top:8px" onclick="importPicks()">Import to JSONBin</button>`;
  html += `</div>`;
  
  // Team coverage details
  if (espnCovered > 0) {
    html += `<div class="settings-section">`;
    // Show mapping summary
    html += `<div class="settings-title">🏀 Team Coverage (${espnCovered}/64)</div>`;
    html += `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">`;
    html += `${teamsMapped}/${teamsTotal} picked teams mapped`;
    if (unpickedCount > 0) html += ` · ${unpickedCount} teams received 0 picks`;
    html += `</div>`;

    // Show any unmapped CBS IDs that ARE in picks (should be 0 — real errors)
    const mapped = new Set(Object.keys(CBS_ESPN_MAP));
    let hasErrors = false;
    allCbsTeams.forEach(cid => {
      if (!mapped.has(cid)) {
        hasErrors = true;
        const team = state.picks?.teamMap?.[cid];
        html += `<div style="font-size:12px;padding:6px 8px;margin:4px 0;background:var(--surface2);border-radius:var(--radius);color:var(--red)">`;
        html += `<div>❌ <strong>${team?.abbrev || '???'}</strong> — ${team?.mediumName || team?.name || 'Unknown'} (CBS ID: ${cid})</div>`;
        html += `<div style="font-size:10px;color:var(--muted)">Picked by pool members but not mapped to ESPN — scoring affected!</div>`;
        html += `</div>`;
      }
    });

    // Show unpicked teams (informational, not errors)
    if (unpickedCount > 0) {
      html += `<details style="margin-top:8px"><summary style="font-size:11px;color:var(--muted);cursor:pointer">`;
      html += `${unpickedCount} unpicked teams (0 picks received — no scoring impact)</summary>`;
      const sorted = Object.entries(ESPN_COVERAGE)
        .filter(([, t]) => !t.picked)
        .sort((a, b) => a[1].region.localeCompare(b[1].region) || a[1].seed - b[1].seed);
      sorted.forEach(([espnId, t]) => {
        html += `<div style="font-size:11px;padding:4px 8px;margin:2px 0;background:var(--surface2);border-radius:var(--radius);color:var(--muted)">`;
        html += `(${t.seed}) ${t.abbr} — ${t.region}`;
        html += `</div>`;
      });
      html += `</details>`;
    }

    if (!hasErrors && espnCovered >= 64) {
      html += `<div style="font-size:12px;padding:8px;margin-top:8px;background:#1e3a2e;border-radius:var(--radius);color:var(--green)">✅ All 64 tournament teams accounted for. Scoring is fully operational.</div>`;
    }
    html += `</div>`;
  }
  
  container.innerHTML = html;
}

function saveSettings() {
  const binKey = document.getElementById('cfg-bin-key').value.trim();
  const myName = document.getElementById('cfg-my-name').value.trim();
  
  localStorage.setItem('ms_jsonbinKey', binKey);
  localStorage.setItem('ms_myName', myName);
  
  CONFIG.jsonbinKey = binKey;
  CONFIG.myName = myName;
  
  showToast('✅ Settings saved');
  fetchAll();
}

function generateBookmark() {
  const params = new URLSearchParams();
  if (CONFIG.jsonbinKey) params.set('key', CONFIG.jsonbinKey);
  if (CONFIG.myName) params.set('name', CONFIG.myName);
  
  const url = window.location.origin + window.location.pathname + '?' + params.toString();
  
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('📎 Bookmark URL copied!');
    }).catch(() => {
      prompt('Copy this URL:', url);
    });
  } else {
    prompt('Copy this URL:', url);
  }
}

async function importPicks() {
  const data = document.getElementById('import-data').value.trim();
  if (!data) { showToast('⚠️ Paste CBS data first'); return; }
  if (!CONFIG.jsonbinId || !CONFIG.jsonbinKey) { showToast('⚠️ Configure JSONBin first'); return; }
  
  try {
    let parsed = JSON.parse(data);
    if (!Array.isArray(parsed)) parsed = [parsed];
    
    // Process into our format
    const processed = processCBSEntries(parsed);
    
    // Upload to JSONBin
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbinId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': CONFIG.jsonbinKey,
      },
      body: JSON.stringify(processed),
    });
    
    if (!res.ok) throw new Error(`JSONBin PUT failed: ${res.status}`);
    
    showToast(`✅ Imported ${processed.entries.length} entries`);
    document.getElementById('import-data').value = '';
    fetchAll();
  } catch (err) {
    showToast(`❌ Import failed: ${err.message}`);
    console.error('Import error:', err);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN FETCH LOOP
// ═══════════════════════════════════════════════════════════════════════════
async function fetchAll() {
  try {
    setStatus('loading', 'updating...');
    
    // Fetch ESPN games, JSONBin picks, and team map in parallel
    const [games, picks, teamMap] = await Promise.all([
      fetchESPNGames(),
      state.picks ? Promise.resolve(state.picks) : fetchPicks(),
      state.teamMap ? Promise.resolve(state.teamMap) : fetchTeamMap(),
    ]);
    
    state.games = games;
    if (picks) state.picks = picks;
    if (teamMap) state.teamMap = teamMap;
    state.lastFetch = new Date();
    
    // Build team mapping from static map
    buildTeamMapping(state.teamMap);
    
    // Compute standings
    state.standings = computeStandings();
    
    // Save rank snapshot
    saveRankSnapshot();
    
    // Update status
    const liveGames = state.games.filter(g => g.state === 'live');
    if (liveGames.length) {
      setStatus('live', `${liveGames.length} game${liveGames.length > 1 ? 's' : ''} live`);
    } else {
      setStatus('live');
    }
    
    state.fetchDone = true;
    console.log(`✅ Loaded: ${games.length} games, ${state.picks?.entries?.length || 0} entries, ${Object.keys(CBS_ESPN_MAP).length} team mappings`);

    // Re-render current tab
    if (state.activeTab === 'games') renderGames();
    else if (state.activeTab === 'standings') renderStandings();
    else if (state.activeTab === 'analytics') renderAnalytics();
    else if (state.activeTab === 'settings') renderSettings();
    
  } catch (err) {
    console.error('❌ Fetch error:', err);
    setStatus('error', err.message);
  }
}

// Force refresh picks and team map from JSONBin
async function refreshPicks() {
  state.picks = null;
  state.teamMap = null;
  await fetchAll();
  showToast('🔄 Picks & team map refreshed');
}

// ═══════════════════════════════════════════════════════════════════════════
// MOBILE SWIPE-TO-CLOSE FOR GAME SHEET
// ═══════════════════════════════════════════════════════════════════════════
(function enableSheetSwipeClose() {
  const sheet = document.getElementById('sheet');
  const handle = sheet ? sheet.querySelector('.sheet-handle') : null;
  if (!sheet || !handle) return;
  let startY = null, lastY = null, dragging = false;

  // Only start swipe-to-close when touch begins on the handle
  handle.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    startY = lastY = e.touches[0].clientY;
    dragging = true;
  }, {passive: true});

  handle.addEventListener('touchmove', function(e) {
    if (!dragging || e.touches.length !== 1) return;
    const y = e.touches[0].clientY;
    const dy = y - startY;
    if (dy > 0) {
      sheet.style.transform = `translateY(${dy}px)`;
      e.preventDefault();
    }
    lastY = y;
  }, {passive: false});

  handle.addEventListener('touchend', function(e) {
    if (!dragging) return;
    const dy = lastY - startY;
    if (dy > 60) {
      closeSheet();
    } else {
      sheet.style.transition = 'transform 0.2s';
      sheet.style.transform = '';
      setTimeout(() => { sheet.style.transition = ''; }, 200);
    }
    dragging = false;
    startY = lastY = null;
  });

  // Reset transform on close
  const origCloseSheet = window.closeSheet;
  window.closeSheet = function() {
    sheet.style.transform = '';
    if (origCloseSheet) origCloseSheet();
  };
})();

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  fetchAll();
  setInterval(fetchAll, CONFIG.pollInterval * 1000);
});
</script>
