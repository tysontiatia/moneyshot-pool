function renderPickPopularity(entries, teamMap) {
  // Find the earliest round with available games (both teams determined)
  const availableGames = state.matchups.filter(m => 
    m.topTeam?.cbsTeamId && m.bottomTeam?.cbsTeamId
  );
  
  if (availableGames.length === 0) {
    return `<div class="analytics-section" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:24px;">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.06em;margin:0 0 16px 0;color:var(--text);">📈 Pick Consensus</h2>
      <div style="color:var(--muted);text-align:center;padding:20px;">No games available yet. Teams are still being determined!</div>
    </div>`;
  }

  // Find the earliest round with incomplete games, or show the most recent round
  const rounds = [...new Set(availableGames.map(g => g.tournamentRound))].sort((a, b) => a - b);
  let targetRound = rounds[rounds.length - 1]; // Default to latest round
  
  for (const round of rounds) {
    const roundGames = availableGames.filter(g => g.tournamentRound === round);
    const incompleteInRound = roundGames.filter(g => !g.winnerId).length;
    if (incompleteInRound > 0) {
      targetRound = round;
      break;
    }
  }
  
  const gamesToShow = availableGames.filter(g => g.tournamentRound === targetRound);
  const roundInfo = ROUND_INFO[targetRound] || { name: `Round ${targetRound}` };
  const complete = gamesToShow.filter(g => g.winnerId).length;
  const total = gamesToShow.length;

  let html = `<div class="analytics-section" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:24px;">
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.06em;margin:0 0 16px 0;color:var(--text);">📈 Pick Consensus: ${roundInfo.name}</h2>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">
      Showing how many people picked each team to advance • ${complete}/${total} games complete
    </div>`;

  gamesToShow.forEach(game => {
    const topTeamId = game.topTeam.cbsTeamId;
    const bottomTeamId = game.bottomTeam.cbsTeamId;
    
    // Count picks for this matchup
    let topCount = 0;
    let bottomCount = 0;
    const topPickers = [];
    const bottomPickers = [];
    
    entries.forEach(entry => {
      const pick = entry.picks?.find(p => 
        p.tournamentRound === game.tournamentRound && 
        p.roundOrdinal === game.roundOrdinal
      );
      
      if (pick) {
        if (pick.cbsTeamId === topTeamId) {
          topCount++;
          topPickers.push(entry.name);
        } else if (pick.cbsTeamId === bottomTeamId) {
          bottomCount++;
          bottomPickers.push(entry.name);
        }
      }
    });

    const total = topCount + bottomCount;
    const topPct = total > 0 ? Math.round((topCount / total) * 100) : 0;
    const bottomPct = total > 0 ? Math.round((bottomCount / total) * 100) : 0;
    
    // Check if game is finished
    const isFinished = game.winnerId !== null;
    const topWon = game.winnerId === topTeamId;
    const bottomWon = game.winnerId === bottomTeamId;
    
    const consensus = Math.max(topCount, bottomCount);
    const isUnanimous = consensus === entries.length;
    const isHighConsensus = consensus >= entries.length * 0.75;
    
    // Check if user is contrarian
    const myEntry = entries.find(e => e.name === CONFIG.myName);
    const myPick = myEntry?.picks?.find(p => 
      p.tournamentRound === game.tournamentRound && 
      p.roundOrdinal === game.roundOrdinal
    );
    const isContrarian = myPick && (
      (myPick.cbsTeamId === topTeamId && topCount < bottomCount) ||
      (myPick.cbsTeamId === bottomTeamId && bottomCount < topCount)
    );

    html += `<div style="margin-bottom:16px;padding:14px;background:var(--surface2);border-radius:6px;${isUnanimous ? 'border:1px solid var(--accent);' : ''}">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;">
        
        <div style="text-align:right;">
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-bottom:4px;">
            <span style="font-size:14px;font-weight:600;color:${isFinished ? (topWon ? 'var(--green)' : 'var(--red)') : 'var(--text)'};">${game.topTeam.abbrev}</span>
            <span style="font-size:10px;color:var(--muted);background:var(--surface3);padding:2px 4px;border-radius:2px;">${game.topItemSeed}</span>
            ${isFinished && topWon ? '<span style="color:var(--green);font-size:12px;">✓</span>' : ''}
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);">${topCount}</div>
          <div style="font-size:10px;color:var(--muted2);">${topPct}%</div>
        </div>

        <div style="text-align:center;min-width:40px;">
          <div style="font-size:11px;color:var(--muted);font-weight:600;">VS</div>
          ${isUnanimous ? '<div style="font-size:8px;color:var(--accent);margin-top:2px;">100%</div>' : ''}
          ${isContrarian && !isUnanimous ? '<div style="font-size:8px;color:var(--accent);margin-top:2px;">⚠️</div>' : ''}
        </div>

        <div style="text-align:left;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            ${isFinished && bottomWon ? '<span style="color:var(--green);font-size:12px;">✓</span>' : ''}
            <span style="font-size:10px;color:var(--muted);background:var(--surface3);padding:2px 4px;border-radius:2px;">${game.bottomItemSeed}</span>
            <span style="font-size:14px;font-weight:600;color:${isFinished ? (bottomWon ? 'var(--green)' : 'var(--red)') : 'var(--text)'};">${game.bottomTeam.abbrev}</span>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);">${bottomCount}</div>
          <div style="font-size:10px;color:var(--muted2);">${bottomPct}%</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:${topPct}% ${bottomPct}%;height:4px;border-radius:2px;overflow:hidden;margin-top:8px;background:var(--surface3);">
        <div style="background:${isFinished ? (topWon ? 'var(--green)' : 'var(--red)') : 'var(--accent)'};"></div>
        <div style="background:${isFinished ? (bottomWon ? 'var(--green)' : 'var(--red)') : 'var(--muted)'};"></div>
      </div>
      ${isContrarian ? '<div style="margin-top:6px;font-size:10px;color:var(--accent);font-weight:600;">⚠️ You picked the underdog!</div>' : ''}
      ${isUnanimous ? '<div style="margin-top:6px;font-size:10px;color:var(--accent);font-weight:600;">🎯 Unanimous pick!</div>' : ''}
      ${isHighConsensus && !isUnanimous ? '<div style="margin-top:6px;font-size:10px;color:var(--green);font-weight:600;">📍 High consensus (75%+)</div>' : ''}
    </div>`;
  });

  html += '</div>';
  return html;
}

        p.tournamentRound === game.tournamentRound && 
        p.roundOrdinal === game.roundOrdinal
      );
      
      if (pick) {
        if (pick.cbsTeamId === topTeamId) {
          topPickers.push(entry.name);
        } else if (pick.cbsTeamId === bottomTeamId) {
          bottomPickers.push(entry.name);
        }
      } else {
        noPick.push(entry.name);
      }
    });

    const affected = topPickers.length + bottomPickers.length;
    const leverage = Math.round((affected / entries.length) * 100);
    const isHighLeverage = leverage >= 80;
    
    const seed1 = game.topTeam.seed || 1;
    const seed2 = game.bottomTeam.seed || 1;
    const mult = ROUND_INFO[game.tournamentRound]?.mult || 1;
    const potentialPoints1 = mult * seed1;
    const potentialPoints2 = mult * seed2;

    html += `<div style="margin-bottom:16px;padding:16px;background:var(--surface2);border-radius:6px;${isHighLeverage ? 'border:1px solid var(--accent);' : ''}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <div style="font-size:16px;font-weight:600;color:var(--text);">${game.topTeam.abbrev} vs ${game.bottomTeam.abbrev}</div>
          <div style="font-size:11px;color:var(--muted);">${rInfo.name || `Round ${game.tournamentRound}`} • Game #${game.roundOrdinal + 1}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);">${leverage}%</div>
          <div style="font-size:9px;color:var(--muted2);text-transform:uppercase;">Pool Impact</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="padding:12px;background:var(--surface3);border-radius:4px;">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">${game.topTeam.abbrev} wins</div>
          <div style="font-size:11px;color:var(--muted2);margin-bottom:4px;">${topPickers.length} people gain ${potentialPoints1} pts</div>
          <div style="font-size:10px;color:var(--muted);line-height:1.3;">${topPickers.slice(0, 5).join(', ')}${topPickers.length > 5 ? ` +${topPickers.length - 5} more` : ''}</div>
        </div>
        <div style="padding:12px;background:var(--surface3);border-radius:4px;">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">${game.bottomTeam.abbrev} wins</div>
          <div style="font-size:11px;color:var(--muted2);margin-bottom:4px;">${bottomPickers.length} people gain ${potentialPoints2} pts</div>
          <div style="font-size:10px;color:var(--muted);line-height:1.3;">${bottomPickers.slice(0, 5).join(', ')}${bottomPickers.length > 5 ? ` +${bottomPickers.length - 5} more` : ''}</div>
        </div>
      </div>
      ${isHighLeverage ? '<div style="margin-top:8px;font-size:10px;color:var(--accent);font-weight:600;">🔥 High impact game - affects 80%+ of pool!</div>' : ''}
    </div>`;
  });

  html += '</div>';
  return html;
}

// ─── TAB SWITCHING ──────────────────────────────────────────────────────────
function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['standings','picks','analytics','bracket','results','settings'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
  });
  state.activeTab = tab;
  if (tab === 'settings') renderSettings();
  else if (tab === 'standings') renderStandings();
  else if (tab === 'picks') renderPickComparison();
  else if (tab === 'analytics') renderAnalytics();
  else if (tab === 'bracket') renderBracket();
  else if (tab === 'results') renderResults();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
renderSettings();
fetchAll();

// Poll every 60s
setInterval(() => {
  // Only poll when visible and NOT actively setting results
  if (document.visibilityState === 'visible' && state.activeTab !== 'results') {
    console.log('⏰ Polling for updates (skipping during active result entry)');
    fetchAll();
  }
}, CONFIG.pollInterval * 1000);
</script>
</body>
</html>
